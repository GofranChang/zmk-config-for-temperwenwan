name: Draw ZMK keymaps
on:
  workflow_dispatch:        # 手动触发
  push:                     # 自动触发
    paths:
      - "config/*.keymap"
      - "config/*.dtsi"
      - "keymap_drawer.config.yaml"

jobs:
  draw:
    uses: caksoylar/keymap-drawer/.github/workflows/draw-zmk.yml@main
    permissions:
      contents: write       # 允许提交文件到仓库
    with:
      keymap_patterns: "config/*.keymap"          # keymap 文件路径
      config_path: "keymap_drawer.config.yaml"    # 配置文件（可选）
      output_folder: "keymap-drawer"              # SVG 输出目录