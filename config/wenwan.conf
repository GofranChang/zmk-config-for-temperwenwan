# This file was generated from a template. Edit it to match your keyboard.
# See https://zmk.dev/docs/development/hardware-integration/new-shield for more
# instructions.

# -------------------------
# Display / nice!view
# -------------------------
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS_SHOW_PERCENTAGE=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=y
CONFIG_ZMK_LV_FONT_DEFAULT_SMALL_MONTSERRAT_26=y
CONFIG_LV_FONT_DEFAULT_MONTSERRAT_26=y

# -------------------------
# Mouse / pointing
# -------------------------
CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_POINTING=y

# -------------------------
# Sleep / battery
# -------------------------
CONFIG_ZMK_SLEEP=y

# 15 minutes idle sleep, good for 120mAh battery
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# If your PCB supports external power control, this may help turn off display/peripherals.
# If build fails because there is no ext-power node, remove these two lines.
CONFIG_ZMK_EXT_POWER=y
# CONFIG_ZMK_EXT_POWER_SAVE=y

# -------------------------
# Host BLE balance
# Keyboard central <-> computer
# -------------------------
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=12
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=24
CONFIG_BT_PERIPHERAL_PREF_LATENCY=4
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400

# Stronger BLE signal, may slightly increase power usage but helps stability.
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# -------------------------
# Split BLE balance
# Left central <-> right peripheral
# Lower than your previous latency to reduce occasional typing lag.
# -------------------------
CONFIG_ZMK_SPLIT_BLE_PREF_INT=6
CONFIG_ZMK_SPLIT_BLE_PREF_LATENCY=2
CONFIG_ZMK_SPLIT_BLE_PREF_TIMEOUT=400

# -------------------------
# Matrix debounce
# -------------------------
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=2
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5
